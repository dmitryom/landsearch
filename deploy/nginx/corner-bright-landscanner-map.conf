# Include these exact locations in the production LandSearch server block before
# the generic `location /` handler. They expose one reviewed static artifact and
# the assets required to render it without relying on a client-side CDN.
location /settlement-map-assets/ {
    alias /var/www/landsearch/settlement-maps/corner-bright/assets/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

location /settlement-map-glyphs/ {
    proxy_pass https://demotiles.maplibre.org/font/;
    proxy_ssl_server_name on;
    proxy_set_header Host demotiles.maplibre.org;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}

location /tiles/carto/labels/ {
    proxy_pass https://a.basemaps.cartocdn.com/light_only_labels/;
    proxy_ssl_server_name on;
    proxy_set_header Host a.basemaps.cartocdn.com;
    proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}

location = /settlements/eafe5fc4-165f-421e-aa79-3ae786458627/map {
    alias /var/www/landsearch/settlement-maps/corner-bright/full_map.html;
    default_type text/html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
}
