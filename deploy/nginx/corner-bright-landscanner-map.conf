# Include this exact location in the production LandSearch server block before
# the generic `location /` handler. It exposes one reviewed static artifact only.
location = /settlements/eafe5fc4-165f-421e-aa79-3ae786458627/map {
    alias /var/lib/landscanner/artifacts/corner-bright/full_map.html;
    default_type text/html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://server.arcgisonline.com https://*.basemaps.cartocdn.com; font-src 'self' data: https://demotiles.maplibre.org; connect-src 'self' https://server.arcgisonline.com https://*.basemaps.cartocdn.com https://demotiles.maplibre.org; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
}
