events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=map_tiles:10m rate=30r/s;
    proxy_cache_path /var/cache/nginx/landsearch-roads levels=1:2 keys_zone=roads_tiles:32m max_size=4g inactive=30d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/landsearch-esri levels=1:2 keys_zone=esri_tiles:64m max_size=8g inactive=30d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/landsearch-base levels=1:2 keys_zone=base_tiles:64m max_size=8g inactive=30d use_temp_path=off;
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;

    include /etc/nginx/mime.types;
    sendfile on;
    tcp_nopush on;
    client_max_body_size 50M;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        application/xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://server.arcgisonline.com https://a.basemaps.cartocdn.com https://tile.openstreetmap.org https://a.tile.opentopomap.org https://a.tile-cyclosm.openstreetmap.fr; font-src 'self' data: https://demotiles.maplibre.org; connect-src 'self' https://server.arcgisonline.com https://a.basemaps.cartocdn.com https://tile.openstreetmap.org https://a.tile.opentopomap.org https://a.tile-cyclosm.openstreetmap.fr https://tiles.openfreemap.org https://demotiles.maplibre.org; worker-src 'self' blob:" always;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;
        set $glyph_upstream demotiles.maplibre.org;
        set $roads_upstream tiles.openfreemap.org;

        location /api/v1/plots/tiles/ {
            limit_req zone=map_tiles burst=200 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 45s;
        }

        location /api/v1/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /_next/static {
            proxy_pass http://frontend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        location /settlement-map-glyphs/ {
            rewrite ^/settlement-map-glyphs/(.*)$ /font/$1 break;
            proxy_pass https://$glyph_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host demotiles.maplibre.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location /embed/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "frame-ancestors 'self' https:" always;
        }

        location = /tiles/roads/tiles.json {
            rewrite ^ /planet break;
            proxy_pass https://$roads_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host tiles.openfreemap.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_set_header Accept-Encoding "";
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_cache roads_tiles;
            proxy_cache_valid 200 1h;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            sub_filter_types application/json;
            sub_filter_once off;
            sub_filter 'https://tiles.openfreemap.org/planet/' '$scheme://$host/tiles/roads/';
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Road-Tile-Cache $upstream_cache_status always;
        }

        location /tiles/roads/ {
            rewrite ^/tiles/roads/(.*)$ /planet/$1 break;
            proxy_pass https://$roads_upstream;
            proxy_ssl_server_name on;
            proxy_set_header Host tiles.openfreemap.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_cache roads_tiles;
            proxy_cache_valid 200 30d;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Road-Tile-Cache $upstream_cache_status always;
        }

        location /tiles/esri/imagery/ {
            proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/;
            proxy_ssl_server_name on;
            proxy_set_header Host server.arcgisonline.com;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_hide_header Cache-Control;
            proxy_cache esri_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Esri-Tile-Cache $upstream_cache_status always;
        }

        location /tiles/esri/labels/ {
            proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/;
            proxy_ssl_server_name on;
            proxy_set_header Host server.arcgisonline.com;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_hide_header Cache-Control;
            proxy_cache esri_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Esri-Tile-Cache $upstream_cache_status always;
        }

        location /tiles/carto/labels/ {
            proxy_pass https://a.basemaps.cartocdn.com/light_only_labels/;
            proxy_ssl_server_name on;
            proxy_set_header Host a.basemaps.cartocdn.com;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /tiles/carto/light/ {
            proxy_pass https://a.basemaps.cartocdn.com/light_all/;
            proxy_ssl_server_name on;
            proxy_set_header Host a.basemaps.cartocdn.com;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /tiles/carto/dark/ {
            proxy_pass https://a.basemaps.cartocdn.com/dark_all/;
            proxy_ssl_server_name on;
            proxy_set_header Host a.basemaps.cartocdn.com;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /tiles/carto/voyager/ {
            proxy_pass https://a.basemaps.cartocdn.com/rastertiles/voyager/;
            proxy_ssl_server_name on;
            proxy_set_header Host a.basemaps.cartocdn.com;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /tiles/osm/ {
            proxy_pass https://tile.openstreetmap.org/;
            proxy_ssl_server_name on;
            proxy_set_header Host tile.openstreetmap.org;
            proxy_set_header User-Agent "LandSearch/1.0 (map tiles)";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /tiles/topo/ {
            proxy_pass https://a.tile.opentopomap.org/;
            proxy_ssl_server_name on;
            proxy_set_header Host a.tile.opentopomap.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /tiles/cyclosm/ {
            proxy_pass https://a.tile-cyclosm.openstreetmap.fr/cyclosm/;
            proxy_ssl_server_name on;
            proxy_set_header Host a.tile-cyclosm.openstreetmap.fr;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_cache base_tiles;
            proxy_cache_lock on;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
