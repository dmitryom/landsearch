events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=map_tiles:10m rate=30r/s;
    proxy_cache_path /var/cache/nginx/landsearch-roads levels=1:2 keys_zone=roads_tiles:32m max_size=4g inactive=30d use_temp_path=off;

    include /etc/nginx/mime.types;
    sendfile on;
    tcp_nopush on;
    client_max_body_size 50M;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        application/xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;

        location /api/v1/plots/tiles/ {
            limit_req zone=map_tiles burst=200 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 45s;
        }

        location /api/v1/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /_next/static {
            proxy_pass http://frontend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        location /settlement-map-glyphs/ {
            proxy_pass https://demotiles.maplibre.org/font/;
            proxy_ssl_server_name on;
            proxy_set_header Host demotiles.maplibre.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location = /tiles/roads/tiles.json {
            proxy_pass https://tiles.openfreemap.org/planet;
            proxy_ssl_server_name on;
            proxy_set_header Host tiles.openfreemap.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_set_header Accept-Encoding "";
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_cache roads_tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            sub_filter_types application/json;
            sub_filter_once off;
            sub_filter 'https://tiles.openfreemap.org/planet/' '$scheme://$host/tiles/roads/';
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Road-Tile-Cache $upstream_cache_status always;
        }

        location /tiles/roads/ {
            proxy_pass https://tiles.openfreemap.org/planet/;
            proxy_ssl_server_name on;
            proxy_set_header Host tiles.openfreemap.org;
            proxy_set_header User-Agent "Mozilla/5.0 LandSearch";
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_cache roads_tiles;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header X-Road-Tile-Cache $upstream_cache_status always;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
